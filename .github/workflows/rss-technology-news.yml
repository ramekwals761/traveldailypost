name: RSS Auto-Publish (technology-news)

on:
  schedule:
    # Runs every 3 hours automatically
    - cron: '44 */3 * * *'
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run? (true/false)'
        required: false
        default: 'false'
      max_articles:
        description: 'Max articles'
        required: false
        default: '1'

jobs:
  poll-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run RSS Poller targeting technology-news
        run: node scripts/rss-poller.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MAX_ARTICLES_PER_RUN: ${{ github.event.inputs.max_articles || '1' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          NEXT_PUBLIC_SITE_URL: 'https://kordinate.world'
          TARGET_CATEGORY: 'technology-news'

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add content/posts/ public/images/articles/ scripts/seen-articles.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-published new technology-news articles from RSS" && git push)
