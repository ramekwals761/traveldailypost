name: Bing IndexNow — Submit New Articles

on:
  push:
    branches:
      - main
    paths:
      - 'content/posts/**'
  workflow_run:
    workflows:
      - "RSS Auto-Publish (airline-news)"
      - "RSS Auto-Publish (cruise-news)"
      - "RSS Auto-Publish (destination-news)"
      - "RSS Auto-Publish (hotel-news)"
      - "RSS Auto-Publish (meeting-events)"
      - "RSS Auto-Publish (railway-news)"
      - "RSS Auto-Publish (technology-news)"
      - "RSS Auto-Publish (tourism-news)"
      - "RSS Auto-Publish (travel-alerts)"
      - "RSS Auto-Publish (travel-association-news)"
      - "RSS Auto-Publish (travel-deals)"
      - "RSS Auto-Publish (travel-events)"
      - "RSS Auto-Publish (travel-news)"
      - "RSS Auto-Publish (travel-trends)"
    types:
      - completed

jobs:
  indexnow:
    name: Submit URLs to Bing IndexNow
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need parent commit to detect changed files
          ref: main        # explicitly fetch latest state so it picks up newly auto-published commits

      - name: Validate required secrets
        env:
          INDEXNOW_API_KEY: ${{ secrets.INDEXNOW_API_KEY }}
        run: |
          if [ -z "$INDEXNOW_API_KEY" ]; then
            echo "❌ INDEXNOW_API_KEY secret is not set in GitHub repository secrets."
            echo "   Go to: Settings → Secrets and variables → Actions → New repository secret"
            echo "   Name:  INDEXNOW_API_KEY"
            echo "   Value: 5b2c3a7f9d8e41209cc1bd9a6e5f8842"
            exit 1
          fi
          echo "✅ INDEXNOW_API_KEY secret is present."

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect new or modified article files
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'content/posts/**' | grep -E '\.(md|mdx)$' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          if [ -z "$CHANGED" ]; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
          else
            echo "no_changes=false" >> $GITHUB_OUTPUT
            # Pick the first changed slug to use as the deployment health-check URL
            FIRST_FILE=$(echo "$CHANGED" | head -1)
            FIRST_SLUG=$(basename "$FIRST_FILE" | sed 's/\.mdx\{0,1\}$//')
            echo "first_slug=$FIRST_SLUG" >> $GITHUB_OUTPUT
          fi

      - name: Skip if no article changes
        if: steps.changed.outputs.no_changes == 'true'
        run: echo "No content/posts changes detected. Skipping IndexNow submission."

      # ── Wait for Vercel deployment to go live before submitting ────────────────
      # Vercel starts deploying on push to main simultaneously with this workflow.
      # We poll the first changed article's URL (up to 10 min) until it returns
      # HTTP 200, then and only then submit to IndexNow. This prevents Bing from
      # crawling a URL that isn't live yet.
      - name: Wait for Vercel deployment to go live
        if: steps.changed.outputs.no_changes == 'false'
        run: |
          SITE_URL="https://kordinate.world"
          SLUG="${{ steps.changed.outputs.first_slug }}"
          TARGET_URL="$SITE_URL/$SLUG"

          echo "⏳ Waiting for deployment to go live..."
          echo "   Polling: $TARGET_URL"

          MAX_ATTEMPTS=60    # 60 × 10s = 10 minutes maximum wait
          ATTEMPT=0

          until [ "$ATTEMPT" -ge "$MAX_ATTEMPTS" ]; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$TARGET_URL" || echo "000")
            echo "   Attempt $((ATTEMPT+1))/$MAX_ATTEMPTS — HTTP $STATUS"

            if [ "$STATUS" = "200" ]; then
              echo "✅ Deployment is live! (HTTP 200)"
              break
            fi

            ATTEMPT=$((ATTEMPT+1))
            if [ "$ATTEMPT" -ge "$MAX_ATTEMPTS" ]; then
              echo "❌ Deployment did not go live within 10 minutes. Aborting IndexNow submission."
              exit 1
            fi

            sleep 10
          done

      - name: Submit changed URLs to Bing IndexNow
        if: steps.changed.outputs.no_changes == 'false'
        env:
          INDEXNOW_API_KEY: ${{ secrets.INDEXNOW_API_KEY }}
        run: |
          SITE_URL="https://kordinate.world"
          KEY="$INDEXNOW_API_KEY"
          HOST="kordinate.world"

          # Build URL list from all changed file slugs
          URL_LIST=""
          while IFS= read -r FILE; do
            if [ -n "$FILE" ]; then
              SLUG=$(basename "$FILE" | sed 's/\.mdx\{0,1\}$//')
              URL_LIST="$URL_LIST\"$SITE_URL/$SLUG\","
            fi
          done <<< "${{ steps.changed.outputs.files }}"

          URL_LIST="[${URL_LIST%,}]"

          echo "🚀 Submitting to Bing IndexNow:"
          echo "$URL_LIST"

          RESPONSE=$(curl -s -o /tmp/bing_response.txt -w "%{http_code}" \
            -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{
              \"host\": \"$HOST\",
              \"key\": \"$KEY\",
              \"keyLocation\": \"$SITE_URL/$KEY.txt\",
              \"urlList\": $URL_LIST
            }")

          echo "Bing HTTP status: $RESPONSE"
          cat /tmp/bing_response.txt

          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "202" ]; then
            echo "✅ IndexNow submission successful!"
          else
            echo "❌ IndexNow submission failed with HTTP $RESPONSE"
            exit 1
          fi
