name: Deploy to Hostinger via FTP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy to Hostinger
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build the static Next.js site (outputs to /out folder)
      - name: Build Next.js static site
        run: npm run build
        env:
          NODE_ENV: production

      # 5. Deploy /out folder to Hostinger via FTP
      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/          # Next.js static build output
          server-dir: /public_html/  # ← Change this to your Hostinger remote path
          dangerous-clean-slate: false  # Set true only on first deploy to wipe old files
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
